<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Note</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./css/style.css">
</head>
  
<body>

  <header>
    <h1>Create Note</h1>
    <a href="./collection.html" class="nav-btn">View Notes ➔</a>
  </header>

  <form id="note-form">
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="title" placeholder="Meeting notes, voice memo..." required>
    </div>

    <div class="form-group">
      <label>Text Content</label>
      <textarea id="content" rows="4" placeholder="Write something..."></textarea>
    </div>

    <div class="form-group">
      <label>Attach Image (Optional)</label>
      <input type="file" id="image-input" accept="image/*">
    </div>

    <div class="form-group">
      <label>Attach Sound / Voice Memo (Optional)</label>
      <input type="file" id="audio-input" accept="audio/*">
    </div>

    <button type="submit" class="btn-primary">Save to Offline DB</button>
  </form>

  <script src="./js/db.js"></script>
  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }

    // Handle Form Submit
    document.getElementById('note-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('title').value;
      const content = document.getElementById('content').value;
      const imageFile = document.getElementById('image-input').files[0];
      const audioFile = document.getElementById('audio-input').files[0];

      await saveNote(title, content, imageFile, audioFile);
      alert('Note Saved Offline!');
      e.target.reset();
    });
  </script>
</body>
</html>
